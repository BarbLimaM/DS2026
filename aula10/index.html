<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 10</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .calculadora {
            background-color: white;
            border: 1px solid #ccc;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 320px;
        }

        input {
            width: 80px;
            margin: 10px 5px;
            padding: 8px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }

        .botoes {
            margin: 15px 0;
        }

        button {
            margin: 4px;
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #ff60b8;
            color: white;
            font-weight: bold;
        }

        button:hover {
            background-color: #ff60b8;
        }

        #resultado {
            font-size: 18px;
            font-weight: bold;
            color: #31e431;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="calculadora">
        <h3>Calculadora</h3>
        
        <input id="n1" type="number" placeholder="Num 1">
        <input id="n2" type="number" placeholder="Num 2">
        
        <div class="botoes">
            <button onclick="calcular('soma')">+</button>
            <button onclick="calcular('sub')">-</button>
            <button onclick="calcular('mult')">×</button>
            <button onclick="calcular('div')">÷</button>
        </div>

        <p>Resultado: <span id="resultado">0</span></p>
    </div>

    <script src="exercicios.js"></script>

</body>
</html>
